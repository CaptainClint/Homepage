<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Christian Schulz – Patentanwalt vor DPMA, EPA, EPG und EUIPO. LL.M., MBA, Dipl.-Ing. Maschinenbau.">
  <title>Christian Schulz – Patentanwalt</title>
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg-primary:    #0f1923;
      --bg-secondary:  #111d27;
      --bg-card:       #162030;
      --bg-nav:        rgba(15, 25, 35, 0.97);
      --accent-green:  #6ee7b7;
      --accent-blue:   #4db8d4;
      --accent-red:    #e88080;
      --border-subtle: #1e3a3a;
      --text-primary:  #ffffff;
      --text-secondary:#cccccc;
      --text-muted:    #888888;
      --text-dim:      #aaaaaa;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    /* ── Typography helpers ── */
    .label {
      color: var(--accent-green);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .section-title {
      color: var(--text-primary);
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    /* ── Section alternating bg ── */
    .section-light { background: var(--bg-secondary); padding: 4rem 2.5rem; }
    .section-dark  { background: var(--bg-primary);   padding: 4rem 2.5rem; }

    /* ── Tag pills ── */
    .tag {
      display: inline-block;
      padding: 0.18rem 0.6rem;
      border-radius: 20px;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      margin: 0.15rem 0.1rem;
    }
    .tag-green { background: rgba(110,231,183,0.15); color: var(--accent-green); border: 1px solid rgba(110,231,183,0.3); }
    .tag-blue  { background: rgba(77,184,212,0.15);  color: var(--accent-blue);  border: 1px solid rgba(77,184,212,0.3); }
    .tag-red   { background: rgba(232,128,128,0.15); color: var(--accent-red);   border: 1px solid rgba(232,128,128,0.3); }
    .tag-bold  { font-weight: 600; }

    /* ── Highlight banners ── */
    .banner {
      border: 1px solid var(--border-subtle);
      border-left-width: 3px;
      padding: 1.2rem 1.5rem;
      margin-top: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .banner-marine { background: linear-gradient(135deg,#0a1520,#0f2030); border-left-color: var(--accent-blue); }
    .banner-china  { background: linear-gradient(135deg,#1a0e0e,#2a1010); border-left-color: var(--accent-red);  }
    .banner-icon   { font-size: 1.6rem; flex-shrink: 0; margin-top: 0.1rem; }
    .banner-title  { color: var(--text-primary); font-size: 0.85rem; margin-bottom: 0.4rem; }
    .banner-desc   { color: var(--text-muted); font-size: 0.75rem; line-height: 1.7; }
    .banner-tags   { display: flex; flex-wrap: wrap; margin-top: 0.5rem; }

    /* ── CTA Button ── */
    .btn-primary {
      display: inline-block;
      background: var(--accent-green);
      color: #0f1923;
      padding: 0.65rem 1.5rem;
      border-radius: 2px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      padding: 2rem;
      max-width: 700px;
      width: 100%;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .modal-box h2 { color: var(--text-primary); margin-bottom: 1rem; font-weight: 300; }
    .modal-box p, .modal-box li { color: var(--text-muted); font-size: 0.82rem; line-height: 1.8; margin-bottom: 0.6rem; }
    .modal-box h3 { color: var(--accent-green); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 1.2rem 0 0.4rem; }

    /* ── Navigation ── */
    #nav {
      position: sticky; top: 0; z-index: 500;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 2.5rem;
      backdrop-filter: blur(8px);
    }
    .nav-logo {
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--accent-green); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }
    .nav-links a {
      color: var(--text-dim);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent-green); }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
      padding: 0.25rem 0.8rem;
      border-radius: 20px;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .lang-btn:hover { background: var(--accent-green); color: #0f1923; }

    /* ── Hero ── */
    #hero {
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      gap: 4rem;
      padding: 4.5rem 2.5rem;
      min-height: 420px;
    }
    .hero-photo {
      width: 220px;
      height: 290px;
      object-fit: cover;
      object-position: top center;
      border-radius: 2px;
      flex-shrink: 0;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    }
    .hero-text { flex: 1; }
    .hero-name {
      color: var(--text-primary);
      font-size: 2.4rem;
      font-weight: 300;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .hero-subtitle {
      color: var(--text-dim);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      line-height: 1.8;
      margin-bottom: 1.6rem;
    }
    .hero-statement {
      color: var(--accent-green);
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 1.8rem;
    }
  </style>
</head>
<body>

  <!-- ══ NAVIGATION ══ -->
  <nav id="nav">
    <a href="#" class="nav-logo">schulz<span>-patent</span></a>
    <div class="nav-links">
      <a href="#ueber-mich" data-i18n="nav.about">Über mich</a>
      <a href="#leistungen" data-i18n="nav.services">Leistungen</a>
      <a href="#kontakt" data-i18n="nav.contact">Kontakt</a>
      <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">EN</button>
    </div>
  </nav>

  <!-- ══ HERO ══ -->
<section id="hero">
  <img src="_KOE8932.jpg" alt="Christian Schulz" class="hero-photo" />
  <div class="hero-text">
    <p class="label" data-i18n="hero.eyebrow">Patentanwalt · DPMA · EPA · EPG · EUIPO</p>
    <h1 class="hero-name">Christian Schulz</h1>
    <p class="hero-subtitle" data-i18n="hero.subtitle">
      LL.M. Europäisches IP-Recht &nbsp;·&nbsp; MBA Internationales Management<br>
      Dipl.-Ing. Maschinenbau &nbsp;·&nbsp; Kapitänleutnant d.R.
    </p>
    <div class="hero-statement" aria-label="Leitspruch">
      <span data-i18n="hero.s1">Technische Tiefe.</span><br>
      <span data-i18n="hero.s2">Juristische Präzision.</span><br>
      <span data-i18n="hero.s3">Strategisches Denken.</span>
    </div>
    <a href="#kontakt" class="btn-primary" data-i18n="hero.cta">Kontakt aufnehmen</a>
  </div>
</section>

<!-- further sections follow -->

  </script>
</body>
</html>
